env:
  max_steps: 50   
  max_mutations: 3        
  sequence_max_len: 200 

agent :
  algorithm : PPO
  learning_rate : 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 0.5

reward:
  plddt_weight:      0.40
  energy_weight:     0.30
  rmsd_weight:       0.20
  solubility_weight: 0.10
  plddt_threshold: 70.0

training:
  total_timesteps: 100000
  eval_freq: 5000
  save_freq: 10000
  log_freq : 100
  device : cpu
