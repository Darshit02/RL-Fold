services:
  postgres:
    image: postgres:15
    container_name: rlfold-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rlfold
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: rlfold-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rlfold-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/rlfold
      REDIS_URL: redis://redis:6379
      SECRET_KEY: supersecretkey-change-in-production
      STORAGE_PATH: /app/storage
      DEBUG: "false"
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rlfold-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/rlfold
      REDIS_URL: redis://redis:6379
      SECRET_KEY: supersecretkey-change-in-production
      STORAGE_PATH: /app/storage
      DEBUG: "false"
    volumes:
      - ./backend:/app
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rlfold-flower
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - worker
    restart: unless-stopped
    command: celery -A app.core.celery_app flower --port=5555
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rlfold-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
  storage_data:
